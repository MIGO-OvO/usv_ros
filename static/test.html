<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Test</title>
    <style>
        body {
            background: #050a14;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }
        .test-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success { color: #00ff9d; }
        .error { color: #ff0055; }
    </style>
</head>
<body>
    <h1>Vue 应用测试页面</h1>
    
    <div id="app" v-cloak>
        <div class="test-box">
            <h2>✅ Vue 已成功挂载</h2>
            <p>当前视图: {{ currentView }}</p>
            <button @click="currentView = 'test'">点击测试</button>
        </div>
        
        <div class="test-box">
            <h2>响应式测试</h2>
            <p>计数器: {{ counter }}</p>
            <button @click="counter++">增加</button>
        </div>
    </div>

    <script type="module">
        import { createApp, ref } from '/static/js/lib/vue.esm-browser.prod.js';
        
        const app = createApp({
            setup() {
                const currentView = ref('dashboard');
                const counter = ref(0);
                
                return {
                    currentView,
                    counter
                };
            }
        });
        
        app.mount('#app');
        
        console.log('✅ Vue 应用已挂载');
    </script>
    
    <style>
        [v-cloak] { display: none; }
    </style>
</body>
</html>
